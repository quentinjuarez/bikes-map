<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bikes Map">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>

  <!-- App tile (full-bleed → maskable-safe) -->
  <rect width="512" height="512" rx="112" fill="url(#tile)" />

  <!-- Solid white location pin -->
  <path
    fill="#ffffff"
    d="M256 438 C208 360 150 296 150 208 A106 106 0 1 1 362 208 C362 296 314 360 256 438 Z"
  />

  <!-- Minimalist bike wheel: bold tire + 4 bold spokes + hub (reads at small sizes) -->
  <g stroke="#1d4ed8" fill="none" stroke-linecap="round">
    <circle cx="256" cy="208" r="68" stroke-width="16" />
    <g stroke-width="13">
      <line x1="256" y1="148" x2="256" y2="268" />
      <line x1="196" y1="208" x2="316" y2="208" />
    </g>
  </g>
  <circle cx="256" cy="208" r="19" fill="#1d4ed8" />
</svg>
